app-id: ai.voxctl.Dictation
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: voxctl
build-options:
  build-args:
    - --share=network
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all # Required for evdev hotkeys (not ideal for Flathub, but necessary for current architecture)
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.Notifications
  - --own-name=ai.voxctl.Dictation

modules:
  - name: portaudio
    buildsystem: autotools
    sources:
      - type: archive
        url: http://files.portaudio.com/archives/pa_stable_v190700_20210406.tgz
        sha256: 47efbf42c77c19a05d22e627d42873e991ec0c1357219c0d74ce6a2948cb2def

  - name: python3-requirements
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --ignore-installed -r requirements.txt
    sources:
      - type: file
        path: requirements.txt

  - name: voxctl
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - mkdir -p /app/share/voxctl
      - cp -r src /app/share/voxctl/
      - cp -r assets /app/share/voxctl/
      - echo '#!/bin/sh' > /app/bin/voxctl
      - echo 'export PYTHONPATH=/app/share/voxctl/src:$PYTHONPATH' >> /app/bin/voxctl
      - echo 'exec python3 /app/share/voxctl/src/main.py "$@"' >> /app/bin/voxctl
      - chmod +x /app/bin/voxctl
      - install -D voxctl.desktop /app/share/applications/ai.voxctl.Dictation.desktop
    sources:
      - type: dir
        path: .
