name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  # ── Rust compile check ────────────────────────────────────────────────────────
  cargo-check:
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            libspeechd-dev \
            libxdo-dev \
            patchelf \
            squashfs-tools \
            pkg-config \
            build-essential

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.os }}

      # whisper-rs-sys/build.rs runs in two phases:
      #   1. bindgen — generates FFI bindings from the C headers
      #   2. cmake  — compiles whisper.cpp into a static C++ library
      #
      # cargo check only needs the bindings (phase 1); it never links against
      # the static library, so phase 2 is unnecessary and often fails on Windows
      # CI runners due to cmake generator version mismatches with the installed
      # Visual Studio.
      #
      # DOCS_RS=1  → build.rs returns after phase 1, before the cmake call
      #              (see whisper-rs-sys/build.rs line 177 vs cmake at line 301)
      # LIBCLANG_PATH → gives bindgen the path to libclang.dll so it generates
      #                  Windows-correct struct sizes rather than falling back to
      #                  the bundled Linux-generated src/bindings.rs (which has
      #                  wrong sizes on Windows, causing E0080 overflow errors).
      - name: Configure whisper-rs-sys for Windows cargo check
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "DOCS_RS=1" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=C:/Program Files/LLVM/bin" >> "$GITHUB_ENV"

      - name: cargo check (workspace, no features)
        run: cargo check --workspace

  # ── Unit tests ────────────────────────────────────────────────────────────────
  cargo-test:
    name: cargo test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            libspeechd-dev \
            libxdo-dev \
            patchelf \
            squashfs-tools \
            pkg-config \
            build-essential

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-linux

      # Run tests for crates that have unit tests and no heavy system deps
      - name: cargo test
        run: cargo test -p voxctr-config -p voxctr-routing

  # ── Frontend type check ───────────────────────────────────────────────────────
  frontend-check:
    name: Frontend type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm install

      # svelte-check + tsc
      - run: npm run check
        continue-on-error: true  # remove once svelte-check is added to package.json
