name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  # ── Rust compile check ────────────────────────────────────────────────────────
  cargo-check:
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            libspeechd-dev \
            libxdo-dev \
            patchelf \
            squashfs-tools \
            pkg-config \
            build-essential

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.os }}

      # Initialize the MSVC developer environment (adds cl.exe, rc.exe, link.exe,
      # etc. to PATH). rc.exe is needed by tauri-winres (voxctr-app's build
      # script) to compile the app manifest resource file.
      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # whisper-rs-sys/build.rs runs in two phases:
      #   1. bindgen — generates FFI bindings from the C headers (needs libclang)
      #   2. cmake  — compiles whisper.cpp into a static C++ library
      #
      # cargo check only needs phase 1 (it never links). DOCS_RS=1 causes
      # build.rs to return early after phase 1 and before cmake (line 177 vs 301).
      # LIBCLANG_PATH lets bindgen find libclang.dll so it generates
      # Windows-correct struct sizes; without it bindgen falls back to the bundled
      # Linux src/bindings.rs which has wrong sizes and causes E0080 errors.
      - name: Configure whisper-rs-sys for Windows cargo check
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "DOCS_RS=1" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=C:/Program Files/LLVM/bin" >> "$GITHUB_ENV"

      - name: cargo check (workspace, no features)
        run: cargo check --workspace

  # ── Unit tests ────────────────────────────────────────────────────────────────
  cargo-test:
    name: cargo test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            libspeechd-dev \
            libxdo-dev \
            patchelf \
            squashfs-tools \
            pkg-config \
            build-essential

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-linux

      # Run tests for crates that have unit tests and no heavy system deps
      - name: cargo test
        run: cargo test -p voxctr-config -p voxctr-routing

  # ── Frontend type check ───────────────────────────────────────────────────────
  frontend-check:
    name: Frontend type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm install

      # svelte-check + tsc
      - run: npm run check
        continue-on-error: true  # remove once svelte-check is added to package.json
